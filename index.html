<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tick your Tacks</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="header">
        <button id="start-button" form="rules">Start</button>
        <div>
            <form id="rules">
                <label for="grid-size">Game Size (3-10): </label>
                <input id="grid-size" type="number" value="3" min="3" max="10" required>
                <label for="player-symbol">Choose symbol: </label>
                <input id="grid-size" type="text" value="X" minlength="1" maxlength="1" required>
            </form>
        </div>
    </div>

    <div id="game-board">
        <div id="overlay">
            <div id="scroll-text"><p id="scroll-text-target"></p></div>
        </div>
        <div id="container">
            <div class="cell"></div>
        </div>
    </div>

    <div id="footer">
        <img src="edit-246.png" id="name-button">
        <div class="footer-text"><span id="player-name">Player</span> score: </div>
        <div id="player-score" class="footertext">0</div>
        <div class="footer-text">Bot score: </div>
        <div id="bot-score" class="footertext">0</div>
    </div>
    
<script src="script.js"></script>
</body>

</html>
