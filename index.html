<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="header">
        <button id="start-button">Start</button>
        <label for="grid-size">Game Size (3-10): </label>
        <input id="grid-size" type="number" value="3" min="3" max="10">
    </div>

    <div id="game-board">
        <div id="container">
            <div id="p00" class="cell">1</div>
            <div id="p01" class="cell">2</div>
            <div id="p02" class="cell">3</div>
            <div id="p10" class="cell">4</div>
            <div id="p11" class="cell">5</div>
            <div id="p12" class="cell">6</div>
            <div id="p20" class="cell">7</div>
            <div id="p21" class="cell">8</div>
            <div id="p22" class="cell">9</div>
        </div>
    </div>

    <div id="footer">
        <div class="footer-text">Player score: </div>
        <div id="player-score" class="footertext">0</div>
        <div class="footer-text">Bot score: </div>
        <div id="bot-score" class="footertext">0</div>
    </div>
    
<script src="script.js"></script>
</body>

</html>
